# .gitlab-ci.yml
stages:
  - build
  - deploy

variables:
  # Using GitLab's built-in registry variables
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}

build-docker:
  stage: build
  image: docker:20.10.16
  services:
    - name: docker:20.10.16-dind
      alias: docker
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .docker-cache/
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Login is successfully completed"
    - mkdir -p .docker-cache
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
    - echo "Docker image built and pushed to ${DOCKER_IMAGE}"
  only:
    - main
    - dev

notify-deployment:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - echo "Deploying using webhook ${DEPLOYMENT_WEBHOOK_URL}"
    - curl -X POST "${DEPLOYMENT_WEBHOOK_URL}"
  only:
    - main
    - dev
  environment:
    name: ${CI_COMMIT_BRANCH}